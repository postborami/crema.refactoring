<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크리마 리뷰 환불 산정 내역서 생성기</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
    <!-- html2pdf for PDF Download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        .glass-panel { background: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        /* PDF 출력 시 배경색 및 그림자 제거 */
        .pdf-content { background: white !important; box-shadow: none !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        const { useState, useEffect, useRef } = React;

        // 아이콘 컴포넌트
        const ClipboardIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        );

        const CheckIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        );

        const DownloadIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        );

        // 유틸 함수
        const cleanNumber = (str) => str ? str.toString().replace(/[^\d-]/g, '') : '0';
        const formatNum = (num) => Number(num || 0).toLocaleString();

        // 스프레드시트 데이터 파싱 로직
        const parseSpreadsheet = (text) => {
            const data = {
                stopDate: '',
                totalRefund: '0',
                products: []
            };
            
            let startDate = '';
            let endDate = '';
            
            // 1. 전체 텍스트에서 정규식으로 필수 항목 먼저 정확하게 추출 (결제ID 등과 겹치지 않도록 방어)
            const totalMatch = text.match(/총\s*환불금액\s*\(부가세\s*제외\)\t?([\d,]+)/) || text.match(/총\s*환불금액\s*\(부가세\s*제외\)\s*([\d,]+)/);
            if (totalMatch) data.totalRefund = Number(totalMatch[1].replace(/,/g, '')).toLocaleString();

            const stopMatch = text.match(/서비스\s*중단일\t?(\d{4}[-.]\s*\d{1,2}[-.]\s*\d{1,2})/) || text.match(/서비스\s*중단일\s*(\d{4}[-.]\s*\d{1,2}[-.]\s*\d{1,2})/);
            if (stopMatch) data.stopDate = stopMatch[1];

            const startMatch = text.match(/시작일\t?(\d{4}[-.]\s*\d{1,2}[-.]\s*\d{1,2})/) || text.match(/시작일\s*(\d{4}[-.]\s*\d{1,2}[-.]\s*\d{1,2})/);
            if (startMatch) startDate = startMatch[1];

            const endMatch = text.match(/만료일\t?(\d{4}[-.]\s*\d{1,2}[-.]\s*\d{1,2})/) || text.match(/만료일\s*(\d{4}[-.]\s*\d{1,2}[-.]\s*\d{1,2})/);
            if (endMatch) endDate = endMatch[1];

            const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);

            // 상품 객체 초기화
            let product1 = { name: '', normalPrice: '0', paymentPrice: '0', penalty: '0', installFee: '0', usageDeduction: '0', balance: '0', usageDays: '0', totalDays: '365' };
            let product2 = { name: '', normalPrice: '0', paymentPrice: '0', penalty: '0', installFee: '0', usageDeduction: '0', balance: '0', usageDays: '0', totalDays: '365' };

            // 각 행 데이터 매칭
            lines.forEach(line => {
                const cols = line.split('\t').map(c => c.trim());
                const safeCols = cols.length > 1 ? cols : line.split(/\s{2,}/).map(c => c.trim()); 

                if (line.startsWith('결제 상품')) {
                    if (safeCols[1]) product1.name = safeCols[1];
                    if (safeCols[2]) product2.name = safeCols[2];
                }
                if (line.startsWith('정상가')) {
                    if (safeCols[1]) product1.normalPrice = cleanNumber(safeCols[1]);
                    if (safeCols[2]) product2.normalPrice = cleanNumber(safeCols[2]);
                }
                if (line.startsWith('결제금액')) {
                    if (safeCols[1]) product1.paymentPrice = cleanNumber(safeCols[1]);
                    if (safeCols[2]) product2.paymentPrice = cleanNumber(safeCols[2]);
                }
                if (line.startsWith('위약금 차감')) {
                    if (safeCols[1]) product1.penalty = cleanNumber(safeCols[1]);
                    if (safeCols[2]) product2.penalty = cleanNumber(safeCols[2]);
                }
                if (line.startsWith('설치비 차감') && !line.includes('여부')) {
                    if (safeCols[1]) product1.installFee = cleanNumber(safeCols[1]);
                    if (safeCols[2]) product2.installFee = cleanNumber(safeCols[2]);
                }
                if (line.startsWith('사용 기간에 따른 차감')) {
                    if (safeCols[1]) product1.usageDeduction = cleanNumber(safeCols[1]);
                    if (safeCols[2]) product2.usageDeduction = cleanNumber(safeCols[2]);
                }
                if (line.startsWith('차감 금액 제외 잔액')) {
                    if (safeCols[1]) product1.balance = cleanNumber(safeCols[1]);
                    if (safeCols[2]) product2.balance = cleanNumber(safeCols[2]);
                }
                if (line.startsWith('사용 기간') && !line.includes('따른')) {
                    if (safeCols[1]) product1.usageDays = cleanNumber(safeCols[1]);
                    if (safeCols[2]) product2.usageDays = cleanNumber(safeCols[2]);
                }
                if (line.startsWith('결제 기간')) {
                    if (safeCols[1]) product1.totalDays = cleanNumber(safeCols[1]);
                    if (safeCols[2]) product2.totalDays = cleanNumber(safeCols[2]);
                }
            });

            // 탭 분리가 안된 경우의 비상용 추출 로직 (크리마 리뷰 텍스트 기반)
            if (!product1.name && text.includes('크리마 리뷰')) {
                product1.name = "크리마 리뷰";
                if(text.includes('API')) product2.name = "[카페24 API 수수료] 크리마 리뷰";
                
                const getMatch = (regex) => { const m = text.replace(/,/g, '').match(regex); return m ? m[1] : '0'; };
                
                product1.normalPrice = getMatch(/정상가.*?(\d{5,})/);
                product1.paymentPrice = getMatch(/결제금액.*?(\d{5,})/);
                product1.penalty = "-" + (parseInt(product1.paymentPrice) * 0.1).toString();
                product1.usageDeduction = getMatch(/사용 기간에 따른 차감.*?(-\d{4,})/);
                product1.installFee = text.includes('설치비 차감-500') ? '-500000' : '0';
                product1.balance = getMatch(/차감 금액 제외 잔액.*?(\d{5,})/);
                product1.usageDays = getMatch(/사용 기간.*?(\d+)/);
                product1.totalDays = "365";

                if (product2.name && text.includes('API')) {
                    const matchNormal = text.replace(/,/g, '').match(/정상가.*?\d{5,}.*?(\d{4,})/);
                    if (matchNormal) product2.normalPrice = matchNormal[1];
                    const matchPayment = text.replace(/,/g, '').match(/결제금액.*?\d{5,}.*?(\d{4,})/);
                    if (matchPayment) product2.paymentPrice = matchPayment[1];
                    product2.penalty = "-" + (parseInt(product2.paymentPrice || '0') * 0.1).toString();
                    const matchUsageDeduction = text.replace(/,/g, '').match(/사용 기간에 따른 차감.*?-\d{4,}.*?(-\d{3,})/);
                    if (matchUsageDeduction) product2.usageDeduction = matchUsageDeduction[1];
                    product2.installFee = '0';
                    const matchBalance = text.replace(/,/g, '').match(/차감 금액 제외 잔액.*?\d{5,}.*?(\d{4,})/);
                    if (matchBalance) product2.balance = matchBalance[1];
                    product2.usageDays = product1.usageDays;
                    product2.totalDays = "365";
                }
            }

            // 시작일/만료일은 모든 상품에 동일하게 적용
            product1.startDate = startDate;
            product1.endDate = endDate;
            product2.startDate = startDate;
            product2.endDate = endDate;

            // 결제금액이 존재하는 상품만 배열에 추가 (API 수수료가 0원이면 product2는 제외됨)
            if (parseInt(product1.paymentPrice) > 0) data.products.push(product1);
            if (parseInt(product2.paymentPrice) > 0) data.products.push(product2);

            return data;
        };

        // 클립보드용 텍스트 생성
        const generateResultText = (data) => {
            let output = "서비스 정보\n";
            output += `서비스 중단일\t${data.stopDate || '-'}\n`;
            output += `시작일\t${data.products[0]?.startDate || '-'}\n`;
            output += `만료일\t${data.products[0]?.endDate || '-'}\n\n`;

            data.products.forEach(p => {
                output += p.name.includes("API") ? "[리뷰 API 수수료 환불]\n" : "[리뷰 서비스 환불]\n";
                output += `사용 기간에 따른 차감\t(${formatNum(p.usageDays)} / ${formatNum(p.totalDays)}) × ${formatNum(p.normalPrice)} ≈ ${formatNum(p.usageDeduction)} 원\n`;
                output += `위약금 차감\t${formatNum(p.paymentPrice)} × 10% = ${formatNum(p.penalty)} 원\n`;
                
                if (Number(p.installFee) !== 0) {
                    output += `설치비 차감\t${formatNum(p.installFee)} 원\n`;
                }

                const totalDed = Number(p.penalty) + Number(p.usageDeduction) + Number(p.installFee);
                
                output += `차감 금액 총합\t${formatNum(p.penalty)} + ${formatNum(p.usageDeduction)}${Number(p.installFee) !== 0 ? ` + ${formatNum(p.installFee)}` : ''} = ${formatNum(totalDed)} 원\n`;
                output += `차감 금액 제외 잔액\t결제금액 ${formatNum(p.paymentPrice)} - (${Math.abs(totalDed).toLocaleString()}) = ${formatNum(p.balance)} 원\n\n`;
            });

            output += `최종 차감 금액 제외 잔액 합산\n`;
            output += `${data.totalRefund || '0'} 원 (소수점 이하 올림)\n`;

            return output;
        };

        const App = () => {
            const [inputText, setInputText] = useState("");
            const [outputText, setOutputText] = useState("");
            const [parsedData, setParsedData] = useState(null);
            const [copied, setCopied] = useState(false);
            const printRef = useRef();

            useEffect(() => {
                if (!inputText.trim()) {
                    setOutputText("");
                    setParsedData(null);
                    return;
                }
                try {
                    const data = parseSpreadsheet(inputText);
                    if (data && data.products.length > 0) {
                        const result = generateResultText(data);
                        setOutputText(result);
                        setParsedData(data);
                    } else {
                        throw new Error("No data parsed");
                    }
                } catch (e) {
                    console.error(e);
                    setOutputText("양식 분석 중 오류가 발생했습니다. 구글 스프레드시트의 표 영역을 복사해서 붙여넣어주세요.");
                    setParsedData(null);
                }
            }, [inputText]);

            const handleCopy = () => {
                if (!outputText) return;
                
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(outputText).then(() => {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    });
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = outputText;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try {
                        document.execCommand("copy");
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    } catch (err) {
                        console.error("Fallback copy failed", err);
                    }
                    document.body.removeChild(textArea);
                }
            };

            const handleDownloadPdf = () => {
                if (!printRef.current || !parsedData) return;
                const element = printRef.current;
                
                // 임시로 PDF 스타일 적용
                element.classList.add('pdf-content');

                const opt = {
                    margin:       [15, 15, 15, 15],
                    filename:     '크리마_리뷰_환불_내역서.pdf',
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                
                html2pdf().set(opt).from(element).save().then(() => {
                    element.classList.remove('pdf-content');
                });
            };

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 h-screen flex flex-col">
                    <header className="mb-6">
                        <h1 className="text-2xl md:text-3xl font-bold text-gray-800">환불 산정 내역서 자동 생성기</h1>
                        <p className="text-gray-500 mt-2">구글 스프레드시트의 환불 계산기 표 영역을 복사해서 왼쪽 칸에 붙여넣어주세요.</p>
                    </header>

                    <div className="flex flex-col md:flex-row gap-6 flex-1 min-h-0">
                        {/* Input Area */}
                        <div className="flex-[1] flex flex-col glass-panel rounded-xl overflow-hidden w-full md:w-1/3 border border-gray-200">
                            <div className="bg-gray-100 border-b border-gray-200 px-4 py-3 flex justify-between items-center">
                                <h2 className="font-semibold text-gray-700">스프레드시트 원본 데이터</h2>
                            </div>
                            <textarea
                                className="flex-1 w-full p-4 bg-white resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm leading-relaxed"
                                placeholder="여기에 복사한 데이터를 붙여넣으세요 (Ctrl+V)..."
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                            ></textarea>
                        </div>

                        {/* Output Area */}
                        <div className="flex-[2] flex flex-col glass-panel rounded-xl overflow-hidden border border-gray-200 relative bg-gray-50">
                            <div className="bg-gray-100 border-b border-gray-200 px-4 py-3 flex justify-between items-center">
                                <h2 className="font-semibold text-gray-700">산정 내역서 결과</h2>
                                <div className="flex gap-2">
                                    <button
                                        onClick={handleCopy}
                                        disabled={!parsedData}
                                        className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-sm font-medium transition-colors border disabled:opacity-50 disabled:cursor-not-allowed ${copied ? 'bg-green-50 text-green-700 border-green-200' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'}`}
                                    >
                                        {copied ? <CheckIcon /> : <ClipboardIcon />}
                                        {copied ? '복사 완료' : '텍스트 복사'}
                                    </button>
                                    <button
                                        onClick={handleDownloadPdf}
                                        disabled={!parsedData || !parsedData.products?.length}
                                        className="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-sm font-medium transition-colors bg-blue-600 text-white hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed"
                                    >
                                        <DownloadIcon />
                                        PDF 다운로드
                                    </button>
                                </div>
                            </div>
                            
                            {/* 문서 표시 영역 (A4 용지 느낌) */}
                            {/* 문서 표시 영역 (배경 회색, 중앙 정렬로 종이 느낌 연출) */}
                            <div className="flex-1 overflow-y-auto bg-gray-200 p-4 md:p-8 flex justify-center">
                                {!parsedData || !parsedData.products?.length ? (
                                    <div className="text-gray-400 mt-20 text-center">결과가 여기에 표시됩니다...</div>
                                ) : (
                                    <div ref={printRef} className="bg-white p-6 md:p-8 w-full max-w-[700px] shadow-sm text-gray-800" style={{ minHeight: '297mm' }}>
                                        {/* 1. 메인 타이틀 */}
                                        <h1 className="text-2xl font-extrabold text-center mb-5 pb-3 border-b-2 border-gray-900">크리마 리뷰 환불 내역서</h1>
                                        
                                        {/* 2. 필수 항목 정보 박스 */}
                                        <div className="bg-gray-50 border border-gray-200 p-3 mb-5 flex justify-around text-center rounded-sm">
                                            <div>
                                                <div className="text-xs text-gray-500 mb-1 font-medium">서비스 중단일</div>
                                                <div className="font-bold text-sm">{parsedData.stopDate || '-'}</div>
                                            </div>
                                            <div>
                                                <div className="text-xs text-gray-500 mb-1 font-medium">서비스 시작일</div>
                                                <div className="font-bold text-sm">{parsedData.products[0]?.startDate || '-'}</div>
                                            </div>
                                            <div>
                                                <div className="text-xs text-gray-500 mb-1 font-medium">서비스 만료일</div>
                                                <div className="font-bold text-sm">{parsedData.products[0]?.endDate || '-'}</div>
                                            </div>
                                        </div>

                                        {/* 3. 서비스 별 차감 내역 */}
                                        {parsedData.products.map((p, idx) => {
                                            const totalDed = Number(p.penalty) + Number(p.usageDeduction) + Number(p.installFee);
                                            const inst = Number(p.installFee);

                                            return (
                                                <div key={idx} className="mb-5">
                                                    <h2 className="text-lg font-bold text-gray-800 mb-3 pb-2 border-b border-gray-400">
                                                        {p.name.includes("API") ? "[리뷰 API 수수료 환불]" : "[리뷰 서비스 환불]"}
                                                    </h2>
                                                    
                                                    {/* 4. 차감 수식 테이블 형태 디자인 */}
                                                    <div className="space-y-1.5 text-xs text-gray-700">
                                                        <div className="flex justify-between items-center bg-white border-b border-gray-100 py-1.5 px-1">
                                                            <span className="font-semibold text-gray-600 w-1/3">사용 기간에 따른 차감</span>
                                                            <span className="text-gray-500 flex-1 text-center font-mono">({formatNum(p.usageDays)} / {formatNum(p.totalDays)}) × {formatNum(p.normalPrice)}</span>
                                                            <span className="font-bold text-right w-1/4">{formatNum(p.usageDeduction)} 원</span>
                                                        </div>
                                                        <div className="flex justify-between items-center bg-white border-b border-gray-100 py-1.5 px-1">
                                                            <span className="font-semibold text-gray-600 w-1/3">위약금 차감</span>
                                                            <span className="text-gray-500 flex-1 text-center font-mono">{formatNum(p.paymentPrice)} × 10%</span>
                                                            <span className="font-bold text-right w-1/4">{formatNum(p.penalty)} 원</span>
                                                        </div>
                                                        {inst !== 0 && (
                                                            <div className="flex justify-between items-center bg-white border-b border-gray-100 py-1.5 px-1">
                                                                <span className="font-semibold text-gray-600 w-1/3">설치비 차감</span>
                                                                <span className="text-gray-500 flex-1 text-center font-mono">-</span>
                                                                <span className="font-bold text-right w-1/4">{formatNum(p.installFee)} 원</span>
                                                            </div>
                                                        )}
                                                        <div className="flex justify-between items-center bg-gray-50 py-1.5 px-2 mt-1.5 rounded">
                                                            <span className="font-semibold text-gray-800 w-1/3">차감 금액 총합</span>
                                                            <span className="text-gray-500 flex-1 text-center font-mono" style={{fontSize: '0.7rem'}}>
                                                                {formatNum(p.penalty)} + {formatNum(p.usageDeduction)} {inst !== 0 ? `+ ${formatNum(p.installFee)}` : ''}
                                                            </span>
                                                            <span className="font-bold text-gray-800 text-right w-1/4">{formatNum(totalDed)} 원</span>
                                                        </div>
                                                        <div className="flex justify-between items-center py-2 px-2 mt-1.5 border-t border-gray-800 border-dashed text-sm">
                                                            <span className="font-bold text-gray-900 w-1/3">차감 금액 제외 잔액</span>
                                                            <span className="text-gray-500 flex-1 text-center font-mono" style={{fontSize: '0.7rem'}}>
                                                                {formatNum(p.paymentPrice)} - ({Math.abs(totalDed).toLocaleString()})
                                                            </span>
                                                            <span className="font-bold text-blue-700 text-right w-1/4">{formatNum(p.balance)} 원</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}

                                        <div className="mt-6 bg-blue-50 border border-blue-200 p-4 text-center rounded-lg">
                                            <div className="text-xs text-blue-800 font-semibold mb-1">최종 차감 금액 제외 잔액 합산 (소수점 이하 올림)</div>
                                            <div className="text-2xl font-extrabold text-blue-900">{parsedData.totalRefund || '0'} 원</div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
